# =========================================================

# Settings
shell fish

# Font
font_size               15
font_family             JetBrainsMono Nerd Font Mono
italic_font             JetBrainsMono Nerd Font Mono Italic
bold_font               JetBrainsMono Nerd Font Mono Bold
bold_italic_font        JetBrainsMono Nerd Font Mono Bold Italic
cursor_blink_interval        0.5
cursor_stop_blinking_after   1

# Windows
remember_window_size    no
initial_window_width    700
initial_window_height   450
window_padding_width    0.5

# Other
update_check_interval   0
confirm_os_window_close 0
enable_audio_bell       no
strip_trailing_spaces   smart
mouse_hide_wait         3.0
copy_on_select          yes
inactive_text_alpha     0.9
# =========================================================

# Shortcuts
map ctrl+tab send_text all \x1b[27;5;9~
map ctrl+shift+tab send_text all \x1b[27;4;9~
# =========================================================

# Theme
# Selection Colors #
selection_foreground     #ebdbb2
selection_background     #d65d0e

# Window border Colors #
active_border_color      #8ec07c
inactive_border_color    #665c54

# Kitty tabs colors #
active_tab_foreground    #ebdbb2
active_tab_background    #458588
inactive_tab_foreground  #ebdbb2
inactive_tab_background  #8ec07c

