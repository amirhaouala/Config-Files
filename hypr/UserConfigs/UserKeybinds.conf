# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# settings for User defaults apps - set your default terminal and file manager on this file
source= $UserConfigs/01-UserDefaults.conf

# common shortcuts
bind = $mainMod, A, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # Main Menu (APP Launcher)
bind = $mainMod, D, exec, pkill rofi || true && ags -t 'overview' # desktop overview (if installed)
bind = $mainMod, E, exec, $files #file manager
bind = $mainMod, X, exec, emacsclient -nc #emacsclient
bind = $mainMod SHIFT, X, exec, emacs #emacs
bind = $mainMod, V, exec, XDG_CURRENT_DESKTOP="GNOME:Hyprland" gnome-control-center #Gnome Control Center
bind = $mainMod SHIFT, V, exec, gnome-boxes
bind = $mainMod, N, exec, hyprpicker --autocopy
bind = $mainMod, M, exec, obs
bind = $mainMod, Return, exec, ptyxis --new-window

bind = $mainMod SHIFT, E, exec, ptyxis -- asciiquarium
bind = $mainMod SHIFT, Z, exec, webapp-manager
bind = $mainMod SHIFT, F, exec, xdg-open "https://"  # default browser
bind = $mainMod SHIFT, C, exec, codium #codium
bind = $mainMod SHIFT, D, exec, ptyxis -- "/home/chad/go/bin/lazydocker"
bind = $mainMod SHIFT, S, exec, ptyxis -- "/home/chad/go/bin/gotop"
bind = $mainMod, F1, exec, chromium-browser --profile-directory="Default"
bind = $mainMod, F2, exec, chromium-browser --profile-directory="Profile 1"
bind = $mainMod, F3, exec, chromium-browser --profile-directory="Profile 2"
bind = $mainMod, F4, exec, chromium-browser --profile-directory="Profile 3"
bind = $mainMod, F5, exec, chromium-browser --profile-directory="Profile 4"
bind = $mainMod, F6, exec, chromium-browser --profile-directory="Profile 5"
bind = $mainMod, F7, exec, chromium-browser --profile-directory="Profile 6"
bind = $mainMod, F8, exec, chromium-browser --profile-directory="Profile 7"
bind = $mainMod, F9, exec, chromium-browser --profile-directory="Profile 8"


# FEATURES / EXTRAS
bind = $mainMod, R, exec, $scriptsDir/Refresh.sh # Refresh waybar, swaync, rofi
bind = $mainMod, G, exec, pkill rofi || $scriptsDir/RofiEmoji.sh # emoji menu
bind = $mainMod, C, exec, pkill rofi || $scriptsDir/ClipManager.sh # Clipboard Manager
bind = $mainMod, Y, exec, pkill rofi || $UserScripts/RofiBeats.sh # online music using rofi
bind = $mainMod, U, exec, $scriptsDir/GameMode.sh # Toggle animations ON/OFF
# bind = $mainMod, B, setprop, active opaque toggle
# bind = $mainMod SHIFT, C, exec, rofi -show window  # list/switch apps using rofi

bind = $mainMod, F, fullscreen # whole full screen
bind = $mainMod, grave, fullscreen, 1 # fake full screen
bind = $mainMod, S, togglefloating, #Float Mode
# bind = $mainMod SHIFT, S, exec, hyprctl dispatch workspaceopt allfloat #All Float Mode

# $mainMod SHIFT, Return
bind = $mainMod SHIFT, Return, exec, chromium-browser --app="https://www.kimi.com/en/" --class=WebApp-Kimi8418 --name=WebApp-Kimi8418 --user-data-dir=/home/chad/.local/share/ice/profiles/Kimi8418
bind = $mainMod SHIFT, Return, exec, [float; move 25% 5%; size 50% 60%] $term # Dropdown terminal
bind = $mainMod SHIFT, Return, exec, emacsclient --create-frame /home/chad/Org/TODO.org

# Dropdown Waydroid
bind = $mainMod, Space, exec, $scriptsDir/Dropterminal.sh waydroid

# Desktop zooming or magnifier
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"
bind = $mainMod SHIFT, page_down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"
bind = $mainMod SHIFT, page_up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod SHIFT, right, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"
bind = $mainMod SHIFT, left, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod SHIFT, down, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"
bind = $mainMod SHIFT, up, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod SHIFT, h, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"
bind = $mainMod SHIFT, l, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod SHIFT, j, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"
bind = $mainMod SHIFT, k, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod, KP_Add, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.3}')"
bind = $mainMod, KP_Subtract, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.3}')"

