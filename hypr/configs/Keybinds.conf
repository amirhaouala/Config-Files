# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts

bindd = $mainMod, B, kill active process, exec, $scriptsDir/KillActiveProcess.sh # KILL active process
bindd = $mainMod, Q, window, killactive # close active (not kill)
bind = $mainMod CTRL, Q, exec, $scriptsDir/KillActiveProcess.sh # Kill active process
bind = $mainMod SHIFT, Q, exec, $scriptsDir/Wlogout.sh # power menu
bind = $mainMod, Delete, exec, $scriptsDir/LockScreen.sh # screen lock
bind = $mainMod SHIFT, Delete, exec, hyprctl dispatch exit 0 # exit Hyprland
bind = $mainMod ALT, Delete, exec, reboot # shut down
bind = $mainMod CTRL, Delete, exec, shutdown now # shut down
bind = $mainMod, T, exec, swaync-client -t -sw # swayNC notification panel
bind = $mainMod, I, exec, pkill rofi || $scriptsDir/Kool_Quick_Settings.sh # Settings Menu KooL Hyprland Settings

# Dwindle Layout
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, togglesplit # only works on dwindle layout

# Works on either layout (Master or Dwindle)
bind = $mainMod SHIFT, Space, swapwindow, l

# layout aware keybinds
exec-once = $scriptsDir/ChangeLayout.sh init

 # Cycle windows if floating bring to top
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop  

# Special Keys / Hot Keys
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec # volume down
bindel = ALT, xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc-precise # volume up precise
bindel = ALT, xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec-precise # volume down precise
bindel = ALT SHIFT,up, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = ALT SHIFT, down, exec, $scriptsDir/Volume.sh --dec # volume down
bindel = ALT SHIFT,page_up, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = ALT SHIFT, page_down, exec, $scriptsDir/Volume.sh --dec # volume down
bindel = ALT SHIFT,K, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = ALT SHIFT, J, exec, $scriptsDir/Volume.sh --dec # volume down
bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic # mic mute
bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle # mute

bindl = , xf86Sleep, exec, systemctl suspend  # sleep button 
bindl = , xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh # Airplane mode

# media controls using keyboards
bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt 
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindl = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop
bindl = ALT, Escape, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = ALT SHIFT, Escape xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop

# Screenshot keybindings
bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --now  # screenshot
bind = $mainMod SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --area # screenshot (area)
bind = $mainMod CTRL, Print, exec, $scriptsDir/ScreenShot.sh --active # screenshot (active window only)
bind = $mainMod ALT, Print, exec, $scriptsDir/ScreenShot.sh --in5 # screenshot  (5 secs delay)

# Resize windows
binde = $mainMod CTRL SHIFT, right, resizeactive,50 0
binde = $mainMod CTRL SHIFT, left, resizeactive,-50 0
binde = $mainMod CTRL SHIFT, page_down, resizeactive,0 50
binde = $mainMod CTRL SHIFT, page_up, resizeactive,0 -50
binde = $mainMod CTRL SHIFT, down, resizeactive,0 50
binde = $mainMod CTRL SHIFT, up, resizeactive,0 -50
binde = $mainMod CTRL SHIFT, h, resizeactive,-50 0
binde = $mainMod CTRL SHIFT, l, resizeactive,50 0
binde = $mainMod CTRL SHIFT, k, resizeactive,0 -50
binde = $mainMod CTRL SHIFT, j, resizeactive,0 50

# Move focus with mainMod + arrow keys
bind = $mainMod, right, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, page_down, movefocus, d
bind = $mainMod, page_up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Special workspace
bind = $mainMod SHIFT, W, movetoworkspace, special
bind = $mainMod, W, togglespecialworkspace,

# The following mappings use the key codes to better support various keyboard layouts
# 1 is code:10, 2 is code 11, etc
# Switch workspaces with mainMod + [0-9] 
bind = $mainMod, code:10, workspace, 1 # NOTE: code:10 = key 1
bind = $mainMod, code:11, workspace, 2 # NOTE: code:11 = key 2
bind = $mainMod, code:12, workspace, 3 # NOTE: code:12 = key 3
bind = $mainMod, code:13, workspace, 4 # NOTE: code:13 = key 4
bind = $mainMod, code:14, workspace, 5 # NOTE: code:14 = key 5
bind = $mainMod, code:15, workspace, 6 # NOTE: code:15 = key 6
bind = $mainMod, code:16, workspace, 7 # NOTE: code:16 = key 7
bind = $mainMod, code:17, workspace, 8 # NOTE: code:17 = key 8
bind = $mainMod, code:18, workspace, 9 # NOTE: code:18 = key 9
bind = $mainMod, code:19, workspace, 10 # NOTE: code:19 = key 0

# Move active window and follow to workspace mainMod + SHIFTlll [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1 # NOTE: code:10 = key 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2 # NOTE: code:11 = key 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3 # NOTE: code:12 = key 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4 # NOTE: code:13 = key 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5 # NOTE: code:14 = key 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6 # NOTE: code:15 = key 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7 # NOTE: code:16 = key 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8 # NOTE: code:17 = key 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9 # NOTE: code:18 = key 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10 # NOTE: code:19 = key 0


# Move active window and follow to adjacent workspace
bind = $mainMod ALT, page_down, movetoworkspace, +1
bind = $mainMod ALT, page_up, movetoworkspace, -1
bind = $mainMod ALT, right, movetoworkspace, +1
bind = $mainMod ALT, left, movetoworkspace, -1
bind = $mainMod ALT, down, movetoworkspace, +1
bind = $mainMod ALT, up, movetoworkspace, -1
bind = $mainMod ALT, l, movetoworkspace, +1
bind = $mainMod ALT, h, movetoworkspace, -1
bind = $mainMod ALT, j, movetoworkspace, +1
bind = $mainMod ALT, k, movetoworkspace, -1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, page_down, workspace, e+1
bind = $mainMod, page_up, workspace, e-1
bind = $mainMod, right, workspace, e+1
bind = $mainMod, left, workspace, e-1
bind = $mainMod, down, workspace, e+1
bind = $mainMod, up, workspace, e-1
bind = $mainMod, l, workspace, e+1
bind = $mainMod, h, workspace, e-1
bind = $mainMod, j, workspace, e+1
bind = $mainMod, k, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow # NOTE: mouse:272 = left click
bindm = $mainMod, mouse:273, resizewindow # NOTE: mouse:272 = right click

# Group
bindd = $mainMod, Z, toggle group, togglegroup

# Navigate within a group
bindd = $mainMod, Tab, Change Group Forward, changegroupactive, f
bindd = $mainMod SHIFT, Tab, Change Group Back, changegroupactive, b

# Move window into/out of group
bindd = $mainMod CTRL, left, Move left into group, moveintogroup, l # Move active window left into a group
bindd = $mainMod CTRL, right, Move Right into group, moveintogroup, r # Move active window right into a group
bindd = $mainMod CTRL, H, Move left into group, moveintogroup, l # Move active window left into a group
bindd = $mainMod CTRL, L, Move Right into group, moveintogroup, r # Move active window right into a group
bindd = $mainMod CTRL, page_down, Move active out of group, moveoutofgroup # Move active window out of group
bindd = $mainMod CTRL, page_up, Move active out of group, moveoutofgroup # Move active window out of group
bindd = $mainMod CTRL, down, Move active out of group, moveoutofgroup # Move active window out of group
bindd = $mainMod CTRL, up, Move active out of group, moveoutofgroup # Move active window out of group
bindd = $mainMod CTRL, J, Move active out of group, moveoutofgroup # Move active window out of group
bindd = $mainMod CTRL, K, Move active out of group, moveoutofgroup # Move active window out of group

# Try to dynamically move in grouped window and when ungrouped 
#  Not working for me DW 11/26/25  PR: https://github.com/JaKooLit/Hyprland-Dots/pull/872
# bindd = $mainMod, right, focus right, exec, bash -c 'if hyprctl activewindow -j | jq -e "((.grouped | type) == \"boolean\") or (.address == (.grouped[-1] // empty))" >/dev/null 2>&1; then hyprctl dispatch movefocus r; else hyprctl dispatch changegroupactive f; fi'
# bindd = $mainMod, left, focus left, exec, bash -c 'if hyprctl activewindow -j | jq -e "((.grouped | type) == \"boolean\") or (.address == (.grouped[0] // empty))" >/dev/null 2>&1; then hyprctl dispatch movefocus l; else hyprctl dispatch changegroupactive b; fi'
